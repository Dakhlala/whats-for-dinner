<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script
      src="https://kit.fontawesome.com/0dfc26d656.js"
      crossorigin="anonymous"
    ></script>
    <title>What's For Dinner</title>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm py-3">
      <div class="container-fluid container-xl">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <div
            class="logo d-flex align-items-center justify-content-center me-3 rounded-circle"
          >
            <i class="fa-solid fa-utensils text-white"></i>
          </div>
          <div class="brand-text">
            <h1 class="m-0 fw-bold fs-4">What's For Dinner</h1>
            <p class="text-secondary m-0 fs-14">Your daily meal inspiration</p>
          </div>
        </a>
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-lg-end"
          id="navbarNavAltMarkup"
        >
          <div class="navbar-nav align-items-lg-center">
            <a
              class="nav-link d-flex align-items-center py-2"
              href="#"
              aria-label="Saved Recipes"
            >
              <i class="fa-solid fa-bookmark" style="font-size: 18px"></i>
              <span class="d-lg-none ms-2">Saved Recipes</span>
            </a>
            <a
              class="nav-link d-flex align-items-center py-2"
              href="#"
              aria-label="Recent"
            >
              <i
                class="fa-solid fa-clock-rotate-left"
                style="font-size: 18px"
              ></i>
              <span class="d-lg-none ms-2">Recent</span>
            </a>
            <a
              class="nav-link d-flex align-items-center me-2 py-2 mb-2 mb-lg-0"
              href="#"
              aria-label="Settings"
            >
              <i class="fa-solid fa-gear" style="font-size: 18px"></i>
              <span class="d-lg-none ms-2">Settings</span>
            </a>
            <div class="d-flex align-items-center">
              <img
                src="images/avatar-2.jpg"
                alt="User profile"
                class="rounded-circle"
                style="width: 35px; height: 35px; object-fit: cover"
              />
              <span class="d-lg-none ms-2">Profile</span>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <section class="py-4 py-md-5">
      <div class="container">
        <div class="card shadow rounded-5 border-0 overflow-hidden max-height">
          <div class="row g-0">
            <!-- Left Side - Image -->
            <div class="col-lg-5 overflow-hidden position-relative">
              <div class="recipe-image-wrapper">
                <img
                  src=""
                  id="recipeImg"
                  alt="Honey Garlic Salmon"
                  class="recipe-image"
                />
                <!-- Rating Badge -->
                <div class="rating-badge">
                  <i
                    class="fa-solid fa-star text-warning me-1"
                    style="font-size: 12px"
                  ></i>
                  <span
                    class="fw-bold"
                    style="font-size: 14px"
                    id="rating"
                  ></span>
                  <span
                    class="text-secondary"
                    style="font-size: 12px"
                    id="reviews"
                  >
                  </span>
                </div>
                <!-- Statistics Card -->
                <div class="stats-card">
                  <div class="row g-0 text-center">
                    <div class="col-4">
                      <div class="stat-item">
                        <i
                          class="fa-regular fa-clock stat-icon"
                          style="color: #f97316"
                        ></i>
                        <div class="stat-label">Prep Time</div>
                        <div class="stat-value" id="prepTime"></div>
                      </div>
                    </div>
                    <div class="col-4">
                      <div class="stat-item">
                        <i
                          class="fa-solid fa-fire stat-icon"
                          style="color: #ef4444"
                        ></i>
                        <div class="stat-label">Cook Time</div>
                        <div class="stat-value" id="cookTime"></div>
                      </div>
                    </div>
                    <div class="col-4">
                      <div class="stat-item">
                        <i
                          class="fa-solid fa-users stat-icon"
                          style="color: #3b82f6"
                        ></i>
                        <div class="stat-label">Servings</div>
                        <div class="stat-value" id="servings"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- Right Side - Content -->
            <div class="col-lg-7 h-100">
              <div class="card-body p-3 p-md-4 overflow-y-auto w-100 p-lg-5 ">
                <!-- Badges -->
                <div class="d-flex gap-2 mb-3">
                  <span class="badge-custom badge-easy" id="difficulty"></span>
                  <span class="badge-custom badge-seafood" id="category"></span>
                </div>
                <!-- Title and Icons -->
                <div
                  class="d-flex align-items-start justify-content-between mb-2"
                >
                  <h2 class="card-title fw-bold m-0" id="recipeTitle"></h2>
                  <div class="d-flex gap-2 ms-3 flex-shrink-0">
                    <button class="icon-btn" aria-label="Bookmark recipe">
                      <i
                        class="fa-solid fa-bookmark"
                        style="color: #f97316"
                      ></i>
                    </button>
                    <button class="icon-btn" aria-label="Share recipe">
                      <i
                        class="fa-solid fa-share-nodes"
                        style="color: #f97316"
                      ></i>
                    </button>
                  </div>
                </div>
                <p
                  class="text-secondary mb-4"
                  style="font-size: 15px"
                  id="description"
                ></p>

                <div  id="warningCard">

                </div>
              

                <!-- Tabs -->
                <ul
                  class="nav nav-tabs recipe-tabs gap-4"
                  id="recipeTab"
                  role="tablist"
                >
                  <li class="nav-item" role="presentation">
                    <button
                      class="nav-link active"
                      id="ingredients-tab"
                      data-bs-toggle="tab"
                      data-bs-target="#ingredients-pane"
                      type="button"
                      role="tab"
                      aria-controls="ingredients-pane"
                      aria-selected="true"
                    >
                      <i class="fa-solid fa-list-check me-1"></i> Ingredients
                    </button>
                  </li>
                  <li class="nav-item" role="presentation">
                    <button
                      class="nav-link"
                      id="instructions-tab"
                      data-bs-toggle="tab"
                      data-bs-target="#instructions-pane"
                      type="button"
                      role="tab"
                      aria-controls="instructions-pane"
                      aria-selected="false"
                    >
                      <i class="fa-solid fa-book-open me-1"></i> Instructions
                    </button>
                  </li>
                  <li class="nav-item" role="presentation">
                    <button
                      class="nav-link"
                      id="nutrition-tab"
                      data-bs-toggle="tab"
                      data-bs-target="#nutrition-pane"
                      type="button"
                      role="tab"
                      aria-controls="nutrition-pane"
                      aria-selected="false"
                    >
                      <i class="fa-solid fa-chart-pie me-1"></i> Nutrition
                    </button>
                  </li>
                  <li class="nav-item" role="presentation">
                    <button
                      class="nav-link"
                      id="tips-tab"
                      data-bs-toggle="tab"
                      data-bs-target="#tips-pane"
                      type="button"
                      role="tab"
                      aria-controls="tips-pane"
                      aria-selected="false"
                    >
                      <i class="fa-solid fa-lightbulb me-1"></i> Chef's Tips
                    </button>
                  </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content mt-3" id="recipeTabContent">

                  <!-- Ingredients Tab -->
                  <div
                    class="tab-pane fade show active"
                    id="ingredients-pane"
                    role="tabpanel"
                    aria-labelledby="ingredients-tab"
                  >
                    <ul
                      class="list-unstyled ingredients-list p-4"
                      id="recipeIngredients"
                    ></ul>
                  </div>

                  <!-- Instructions Tab -->
                  <div
                    class="tab-pane fade"
                    id="instructions-pane"
                    role="tabpanel"
                    aria-labelledby="instructions-tab"
                  >
                    <div class="instructions-list" id="instructions"></div>
                  </div>

                  <!-- Nutrition Tab -->
                  <div
                    class="tab-pane fade"
                    id="nutrition-pane"
                    role="tabpanel"
                    aria-labelledby="nutrition-tab"
                  >
                    <div class="row mb-3">
                      <div class="col-md-6 col-12 mb-3 mb-md-0">
                        <div class="nutrition-card justify-content-between p-3">
                          <div class="d-flex align-items-center gap-3">
                            <div
                              class="nutrition-icon-wrapper"
                              style="background-color: #fff7ed"
                            >
                              <i
                                class="fa-solid fa-fire"
                                style="color: #f97316"
                              ></i>
                            </div>
                            <span class="nutrition-label">Calories</span>
                          </div>
                          <span class="nutrition-value" id="calories"></span>
                        </div>
                      </div>
                      <div class="col-md-6 col-12">
                        <div class="nutrition-card justify-content-between p-3">
                          <div class="d-flex align-items-center gap-3">
                            <div
                              class="nutrition-icon-wrapper"
                              style="background-color: #eff6ff"
                            >
                              <i
                                class="fa-solid fa-dumbbell"
                                style="color: #3b82f6"
                              ></i>
                            </div>

                            <span class="nutrition-label">Protein</span>
                          </div>
                          <span class="nutrition-value" id="protein"></span>
                        </div>
                      </div>
                    </div>
                    <div class="row mb-3">
                      <div class="col-md-6 col-12 mb-3 mb-md-0">
                        <div class="nutrition-card justify-content-between p-3">
                          <div class="d-flex align-items-center gap-3">
                            <div
                              class="nutrition-icon-wrapper"
                              style="background-color: #fefce8"
                            >
                              <i
                                class="fa-solid fa-wheat-awn"
                                style="color: #eab308"
                              ></i>
                            </div>

                            <span class="nutrition-label">Carbohydrates</span>
                          </div>
                          <span class="nutrition-value" id="carbs"></span>
                        </div>
                      </div>
                      <div class="col-md-6 col-12">
                        <div class="nutrition-card justify-content-between p-3">
                          <div class="d-flex align-items-center gap-3">
                            <div
                              class="nutrition-icon-wrapper"
                              style="background-color: #fef2f2"
                            >
                              <i
                                class="fa-solid fa-droplet"
                                style="color: #ef4444"
                              ></i>
                            </div>
                            <span class="nutrition-label">Fat</span>
                          </div>

                          <span class="nutrition-value" id="fat"></span>
                        </div>
                      </div>
                    </div>

                    <div class="row ">
                      <div class="col-md-6 col-12 mb-3 mb-md-0">
                        <div class="nutrition-card justify-content-between p-3">
                          <div class="d-flex align-items-center gap-3">
                            <div
                              class="nutrition-icon-wrapper"
                              style="background-color: #f0fdf4"
                            >
                              <i
                                class="fa-solid fa-seedling"
                                style="color: #22c55e"
                              ></i>
                            </div>
                            <span class="nutrition-label">Fiber</span>
                          </div>
                          <span class="nutrition-value" id="fiber"></span>
                        </div>
                      </div>
                      <div class="col-md-6 col-12 mb-0 mb-md-5">
                        <div class="nutrition-card justify-content-between p-3">
                          <div class="d-flex align-items-center gap-3">
                            <div
                              class="nutrition-icon-wrapper"
                              style="background-color: #fdf2f8"
                            >
                              <i
                                class="fa-solid fa-cube"
                                style="color: #ec4899"
                              ></i>
                            </div>
                            <span class="nutrition-label">Sodium</span>
                          </div>
                          <span class="nutrition-value" id="sodium"></span>
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Chef's Tips Tab -->
                  <div
                    class="tab-pane fade"
                    id="tips-pane"
                    role="tabpanel"
                    aria-labelledby="tips-tab"
                  >
                    <div class="tips-list mb-0 mb-md-5" id="tips"></div>
                  </div>
                </div>

                <div class="line bg-secondary-subtle mt-2"></div>

                <div class="mt-4 pt-2 ">
                  <button class="btn-try-recipe" onclick="displayRecipe()">
                    <i class="fa-solid fa-rotate me-1"></i>Try Another Recipe
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
